# Docker Compose 生产环境覆盖配置
#
# 用法: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# 特性:
#   - WARNING 日志级别
#   - 严格资源限制
#   - 4 API workers
#   - 健康检查
#   - restart: unless-stopped
#   - 仅 API 端口对外暴露

services:
  postgres:
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyberpulse -d cyberpulse"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # 生产环境不暴露端口
    restart: unless-stopped

  redis:
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # 生产环境不暴露端口
    restart: unless-stopped

  api:
    environment:
      LOG_LEVEL: WARNING
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    command: uvicorn cyberpulse.api.main:app --host 0.0.0.0 --port 8000 --workers 4

  worker:
    environment:
      LOG_LEVEL: WARNING
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -v grep | grep dramatiq || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    command: dramatiq cyberpulse.tasks --processes 4 --threads 4

  scheduler:
    environment:
      LOG_LEVEL: WARNING
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -v grep | grep scheduler || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped