# Docker Compose 测试环境覆盖配置
#
# 用法: docker compose -f docker-compose.yml -f docker-compose.test.yml up -d
#
# 特性:
#   - INFO 日志级别
#   - 中等资源限制
#   - 2 API workers
#   - 端口对外暴露

services:
  postgres:
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  redis:
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  api:
    environment:
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    command: uvicorn cyberpulse.api.main:app --host 0.0.0.0 --port 8000 --workers 2

  worker:
    environment:
      LOG_LEVEL: INFO
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    command: dramatiq cyberpulse.tasks --processes 2 --threads 2

  scheduler:
    environment:
      LOG_LEVEL: INFO
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M