# Docker Compose 开发环境覆盖配置
#
# 用法: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# 特性:
#   - 挂载本地代码支持热重载
#   - DEBUG 日志级别
#   - 单进程模式
#   - 端口配置继承 docker-compose.yml 的变量配置

services:
  api:
    environment:
      LOG_LEVEL: DEBUG
      DEBUG: "true"
    volumes:
      # 挂载本地代码支持热重载
      - ../src:/app/src:ro
      - ../tests:/app/tests:ro
      - ./data:/app/data
      - ./logs:/app/logs
    command: uvicorn cyberpulse.api.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    environment:
      LOG_LEVEL: DEBUG
      DEBUG: "true"
    volumes:
      # 挂载本地代码支持热重载
      - ../src:/app/src:ro
      - ../tests:/app/tests:ro
      - ./data:/app/data
      - ./logs:/app/logs
    # 单进程模式便于调试
    command: dramatiq cyberpulse.tasks --processes 1 --threads 1

  scheduler:
    environment:
      LOG_LEVEL: DEBUG
      DEBUG: "true"
    volumes:
      # 挂载本地代码支持热重载
      - ../src:/app/src:ro
      - ../tests:/app/tests:ro
      - ./data:/app/data
      - ./logs:/app/logs