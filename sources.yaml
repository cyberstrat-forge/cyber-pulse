# sources.yaml - cyber-pulse 情报源配置
# 从 OPML 导入，按分类组织
#
# 字段说明：
# - name: 情报源名称（必需，唯一）
# - connector_type: 类型 rss/api/web/media（必需）
# - config: Connector 配置（必需）
#   - RSS: feed_url
#   - API: url, api_key (可选)
#   - Web: url
#   - Media: url, api_key (可选)
# - tier: 优先级 T0-T3（可选，默认 T2）

