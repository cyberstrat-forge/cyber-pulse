services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cyberpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cyberpulse123}
      POSTGRES_DB: cyberpulse
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Port exposed only for development/debugging - comment out for production
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyberpulse -d cyberpulse"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7
    volumes:
      - redis_data:/data
    # Port exposed only for development/debugging - comment out for production
    # ports:
    #   - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cyberpulse}:${POSTGRES_PASSWORD:-cyberpulse123}@postgres:5432/cyberpulse
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn cyberpulse.api.main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cyberpulse}:${POSTGRES_PASSWORD:-cyberpulse123}@postgres:5432/cyberpulse
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: dramatiq cyberpulse.tasks --processes 1 --threads 2

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cyberpulse}:${POSTGRES_PASSWORD:-cyberpulse123}@postgres:5432/cyberpulse
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: python -m cyberpulse.scheduler.main

volumes:
  postgres_data:
  redis_data: